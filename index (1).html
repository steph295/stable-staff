tion openConfirmLeftModal() { document.getElementById('modal-confirm-left').classList.add('open'); }\nfunction disputeLeaveStable() {\n  empState.showTrainerLeftAlert = false;\n  empState.showLeaveDisputedBanner = true;\n  closeModal('modal-confirm-left');\n  renderEmpListBanners();\n}\nfunction confirmLeaveStable() {\n  empState.showTrainerLeftAlert = false;\n  empState.showTerminationBanner = true;\n  empState.passActive = false;\n  closeModal('modal-confirm-left');\n  go('screen-employees');\n  if (typeof empSubtab === 'function') empSubtab('past');\n  renderEmpListBanners();\n}\n\n// ==================== NI “TURNED 16” ALERT ====================\nfunction requestNiNumber() {\n  empState.showNiRequestedBanner = true;\n  empState.showNi16Alert = false;\n  renderEmpListBanners();\n  alert('Notification sent to Charlie Foster (and parent on record) asking them to add their NI number. Reminder set for 7 days.');\n}\nfunction openReportIssueModal() {\n  document.getElementById('modal-report-issue').classList.add('open');\n}\nfunction submitReportIssue() {\n  closeModal('modal-report-issue');\n  alert('Your issue has been submitted confidentially to Racing Digital.');\n}\n\nfunction confirmCancelPass() {\n  empState.passActive = false;\n  empState.showPassCancelBanner = true;\n  closeModal('modal-cancel-pass');\n  renderProfileBanners();\n}\n\nfunction checkDisclaimer() {\n  var val = document.getElementById('disclaimer-name').value.trim();\n  document.getElementById('btn-disclaimer').disabled = !val;\n}\n\nfunction submitAddEmployee() {\n  empState.showWelcomeBanner = true;\n  go('screen-employees');\n  renderEmpListBanners();\n}\n\n// ==================== REGISTRATION FLOW (NEW) ====================\nvar regState = { method: 'trainer', otherTrainers: false, otherTrainersList: [], roles: 1, handoverEmail: true, handoverSms: false, matchSelection: null };\n\nfunction selectMethod(which) {\n  regState.method = which;\n  document.getElementById('method-trainer').classList.toggle('selected', which === 'trainer');\n  document.getElementById('method-invite').classList.toggle('selected', which === 'invite');\n}\n\nfunction continueFromMethod() {\n  if (regState.method === 'invite') {\n    go('screen-add-emp-invite');\n    return;\n  }\n  go('screen-add-emp-racing');\n}\n\n// ==================== RACING HISTORY (SER lookup) ====================\nregState.racingHistory = 'yes';\nregState.serMatch = null;\nfunction selectRacingHistory(which) {\n  regState.racingHistory = which;\n  document.getElementById('racing-yes').classList.toggle('selected', which === 'yes');\n  document.getElementById('racing-no').classList.toggle('selected', which === 'no');\n  document.getElementById('racing-yes-panel').style.display = which === 'yes' ? '' : 'none';\n  if (which !== 'yes') resetSerLookup();\n}\nfunction resetSerLookup() {\n  regState.serMatch = null;\n  var m = document.getElementById('ser-lookup-match'); if (m) m.style.display = 'none';\n  var n = document.getElementById('ser-lookup-none'); if (n) n.style.display = 'none';\n}\nfunction runSerLookup() {\n  var input = document.getElementById('ser-lookup-input');\n  var val = (input && input.value || '').trim();\n  if (!val) { input && input.focus(); return; }\n  // Demo: any non-empty value finds James O'Connor; values starting with \"0\" find no match\n  var found = !val.startsWith('0');\n  regState.serMatch = found ? { ser: val, name: \"James O'Connor\" } : null;\n  document.getElementById('ser-lookup-match').style.display = found ? 'flex' : 'none';\n  document.getElementById('ser-lookup-none').style.display = found ? 'none' : '';\n  var noneNum = document.getElementById('ser-lookup-none-num');\n  if (noneNum) noneNum.textContent = val;\n}\n\n// ==================== TAB SWITCHING ====================\nfunction switchLookupTab(which) {\n  document.getElementById('lookup-tab-ser').classList.toggle('active', which === 'ser');\n  document.getElementById('lookup-tab-namedob').classList.toggle('active', which === 'namedob');\n  document.getElementById('lookup-pane-ser').style.display = which === 'ser' ? '' : 'none';\n  document.getElementById('lookup-pane-namedob').style.display = which === 'namedob' ? '' : 'none';\n}\n\n// ==================== NAME & DOB LOOKUP ====================\nfunction resetNameDobLookup() {\n  ['nd-result-matches','nd-result-none','nd-result-confirmed'].forEach(function(id){\n    var el = document.getElementById(id);\n    if (el) el.style.display = 'none';\n  });\n}\nfunction resetNameDobForm() {\n  ['nd-first','nd-last','nd-dob'].forEach(function(id){\n    var el = document.getElementById(id);\n    if (el) el.value = '';\n  });\n  resetNameDobLookup();\n  var first = document.getElementById('nd-first');\n  if (first) first.focus();\n}\nfunction runNameDobLookup() {\n  var first = (document.getElementById('nd-first').value || '').trim();\n  var last  = (document.getElementById('nd-last').value || '').trim();\n  var dob   = (document.getElementById('nd-dob').value || '').trim();\n  resetNameDobLookup();\n  if (!first && !last && !dob) {\n    document.getElementById('nd-first').focus();\n    return;\n  }\n  // Demo logic:\n  //   - last name starts with 'z' (case-insensitive) → no matches\n  //   - otherwise return 2 candidates\n  var noResults = last && last.toLowerCase().startsWith('z');\n  if (noResults) {\n    var recap = [];\n    if (first) recap.push('first name <strong>' + escHtml(first) + '<\u002Fstrong>');\n    if (last)  recap.push('last name <strong>' + escHtml(last) + '<\u002Fstrong>');\n    if (dob)   recap.push('DOB <strong>' + escHtml(dob) + '<\u002Fstrong>');\n    document.getElementById('nd-recap').innerHTML = recap.join(', ');\n    document.getElementById('nd-result-none').style.display = '';\n    return;\n  }\n  // Build candidate list\n  var candidates = [\n    { ser:'48273', name: (first || 'James') + ' ' + (last || \"O'Connor\"), dob: dob || '14/06/1996', stable:'G. Patterson Racing', period:'2019–2024', conf:'high' },\n    { ser:'31182', name: (first || 'James') + ' ' + (last || \"O'Connor\"), dob: '14/06/1996', stable:'Hollybrook Stables', period:'2016–2019', conf:'med' }\n  ];\n  var html = '';\n  for (var i = 0; i < candidates.length; i++) {\n    var c = candidates[i];\n    var initials = c.name.split(' ').map(function(p){return p[0]||'';}).join('').toUpperCase().slice(0,2);\n    html += '<button type=\"button\" class=\"match-candidate\" onclick=\"confirmNameDobMatch(' + i + ')\">'\n         +    '<div class=\"mc-avatar\">' + escHtml(initials) + '<\u002Fdiv>'\n         +    '<div class=\"mc-main\">'\n         +      '<div class=\"mc-name\">' + escHtml(c.name) + ' &middot; SER ' + escHtml(c.ser) + '<\u002Fdiv>'\n         +      '<div class=\"mc-meta\">DOB ' + escHtml(c.dob) + ' &middot; ' + escHtml(c.stable) + ' (' + escHtml(c.period) + ')<\u002Fdiv>'\n         +    '<\u002Fdiv>'\n         +    '<span class=\"mc-conf ' + c.conf + '\">' + (c.conf === 'high' ? 'Strong match' : 'Possible match') + '<\u002Fspan>'\n         +  '<\u002Fbutton>';\n  }\n  document.getElementById('nd-candidates').innerHTML = html;\n  document.getElementById('nd-result-count').textContent = candidates.length;\n  document.getElementById('nd-result-matches').style.display = '';\n  window._ndCandidates = candidates;\n}\nfunction showNameDobNoMatch() {\n  var first = (document.getElementById('nd-first').value || '').trim();\n  var last  = (document.getElementById('nd-last').value || '').trim();\n  var dob   = (document.getElementById('nd-dob').value || '').trim();\n  var recap = [];\n  if (first) recap.push('first name <strong>' + escHtml(first) + '<\u002Fstrong>');\n  if (last)  recap.push('last name <strong>' + escHtml(last) + '<\u002Fstrong>');\n  if (dob)   recap.push('DOB <strong>' + escHtml(dob) + '<\u002Fstrong>');\n  document.getElementById('nd-recap').innerHTML = recap.join(', ') || 'the details you entered';\n  document.getElementById('nd-result-matches').style.display = 'none';\n  document.getElementById('nd-result-none').style.display = '';\n}\nfunction confirmNameDobMatch(idx) {\n  var c = (window._ndCandidates || [])[idx];\n  if (!c) return;\n  regState.serMatch = { ser: c.ser, name: c.name };\n  document.getElementById('nd-result-matches').style.display = 'none';\n  document.getElementById('nd-result-none').style.display = 'none';\n  document.getElementById('nd-confirmed-body').innerHTML =\n    'SER <strong>' + escHtml(c.ser) + '<\u002Fstrong> &middot; <strong>' + escHtml(c.name) + '<\u002Fstrong> &middot; DOB ' + escHtml(c.dob) + ' &middot; ' + escHtml(c.stable) + '. We&rsquo;ll pre-fill their details \\u2014 you&rsquo;ll only need to confirm employment with your stable.';\n  document.getElementById('nd-result-confirmed').style.display = 'flex';\n}\nfunction treatAsFirstTime() {\n  selectRacingHistory('no');\n}\nfunction openSerSupportModal() {\n  // Pre-fill the \"details you've already tried\" hint\n  var first = (document.getElementById('nd-first').value || '').trim();\n  var last  = (document.getElementById('nd-last').value || '').trim();\n  var dob   = (document.getElementById('nd-dob').value || '').trim();\n  var tried = [first, last, dob].filter(Boolean).join(' · ') || '(no details entered)';\n  var triedEl = document.getElementById('sup-tried');\n  if (triedEl) triedEl.value = tried;\n  var m = document.getElementById('modal-ser-support');\n  if (m) m.classList.add('open');\n}\nfunction submitSerSupport() {\n  closeModal('modal-ser-support');\n  // Show a confirmation toast-style banner inside the panel\n  document.getElementById('nd-result-none').insertAdjacentHTML('afterbegin',\n    '<div class=\"banner banner-success\" style=\"margin-bottom:10px\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Request sent to CS team. Reference #SUP-' + Math.floor(Math.random()*9000+1000) + ' &middot; they\\u2019ll reply within 1 working day. Carry on registering \\u2014 we\\u2019ll merge later if a match is found.<\u002Fdiv><\u002Fdiv>'\n  );\n}\nfunction escHtml(s) {\n  return String(s).replace(/[&<>\"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'})[c]; });\n}\nfunction continueFromRacingHistory() {\n  // (In a real flow we'd pre-fill the details form when serMatch is set.)\n  go('screen-add-emp-1');\n}\n\n// ==================== NI visibility based on DOB ====================\nwindow.updateNiVisibility = function() {\n  var dobEl = document.getElementById('emp-dob');\n  var full = document.getElementById('emp-ni-field');\n  var under = document.getElementById('emp-ni-under16');\n  if (!dobEl || !full || !under) return;\n  var val = (dobEl.value || '').trim();\n  var m = val.match(/^(\\d{1,2})[\\/\\-\\.](\\d{1,2})[\\/\\-\\.](\\d{4})$/);\n  if (!m) { // incomplete — leave default (NI shown, required)\n    full.style.display = ''; under.style.display = 'none'; return;\n  }\n  var d = parseInt(m[1],10), mo = parseInt(m[2],10), y = parseInt(m[3],10);\n  var dob = new Date(y, mo - 1, d);\n  if (isNaN(dob.getTime())) { full.style.display = ''; under.style.display = 'none'; return; }\n  var now = new Date();\n  var age = now.getFullYear() - dob.getFullYear();\n  var hasHadBday = (now.getMonth() > dob.getMonth()) || (now.getMonth() === dob.getMonth() && now.getDate() >= dob.getDate());\n  if (!hasHadBday) age -= 1;\n  var under16 = age < 16;\n  full.style.display = under16 ? 'none' : '';\n  under.style.display = under16 ? '' : 'none';\n};\n\nfunction sendInvite() {\n  go('screen-add-emp-invite-success');\n}\n\nfunction toggleOtherTrainer(btn, value) {\n  regState.otherTrainers = value;\n  var siblings = btn.parentElement.querySelectorAll('button');\n  siblings.forEach(function(b){ b.classList.remove('active'); });\n  btn.classList.add('active');\n  var fields = document.getElementById('other-trainer-fields');\n  if (value === true || value === 'unsure') {\n    fields.style.display = 'block';\n    if (value === true && document.getElementById('other-trainer-list').children.length === 0) {\n      addOtherTrainer();\n    }\n  } else {\n    fields.style.display = 'none';\n  }\n}\n\nfunction addOtherTrainer() {\n  var list = document.getElementById('other-trainer-list');\n  var idx = list.children.length;\n  var row = document.createElement('div');\n  row.className = 'other-trainer-card';\n  row.style.display = 'block';\n  row.style.padding = '12px 14px';\n  row.innerHTML = '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\">' +\n    '<b style=\"font-size:11px;color:#1a2037;text-transform:uppercase;letter-spacing:0.4px\">Trainer ' + (idx + 1) + '<\u002Fb>' +\n    '<button type=\"button\" onclick=\"this.closest(\\'.other-trainer-card\\').remove()\" style=\"background:none;border:none;color:#b2113a;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500\">Remove<\u002Fbutton>' +\n    '<\u002Fdiv>' +\n    '<div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:10px\">' +\n    '<div class=\"field\" style=\"margin:0\"><label style=\"font-size:11px;margin-bottom:4px;display:block;color:#6b7280\">Trainer name<\u002Flabel><input type=\"text\" placeholder=\"e.g. G. Patterson\" style=\"width:100%;padding:7px 10px;border:1px solid #d8dde2;border-radius:4px;font-family:inherit;font-size:12px\"><\u002Fdiv>' +\n    '<div class=\"field\" style=\"margin:0\"><label style=\"font-size:11px;margin-bottom:4px;display:block;color:#6b7280\">Role<\u002Flabel><input type=\"text\" placeholder=\"e.g. Work Rider\" style=\"width:100%;padding:7px 10px;border:1px solid #d8dde2;border-radius:4px;font-family:inherit;font-size:12px\"><\u002Fdiv>' +\n    '<\u002Fdiv>';\n  list.appendChild(row);\n}\n\n// People-match step removed — trainer no longer manually resolves duplicates.\n\nfunction addRoleRow() {\n  var list = document.getElementById('role-list');\n  var idx = list.children.length;\n  var row = document.createElement('div');\n  row.className = 'role-row';\n  row.setAttribute('data-role-idx', String(idx));\n  row.innerHTML =\n    '<div class=\"role-row-head\">' +\n      '<h5>Role ' + (idx + 1) + ' · Additional<\u002Fh5>' +\n      '<button type=\"button\" class=\"remove-role\" onclick=\"removeRoleRow(this)\">Remove<\u002Fbutton>' +\n    '<\u002Fdiv>' +\n    '<div class=\"form-grid-2\">' +\n      '<div class=\"field\"><label>Start date *<\u002Flabel><input type=\"text\" placeholder=\"DD/MM/YYYY\"><\u002Fdiv>' +\n      '<div class=\"field\"><label>Job title *<\u002Flabel><select><option>Select<\u002Foption><option>Driver<\u002Foption><option>Work Rider<\u002Foption><option>Yard Person<\u002Foption><option>Maintenance<\u002Foption><option>Other duties<\u002Foption><\u002Fselect><\u002Fdiv>' +\n    '<\u002Fdiv>' +\n    '<div class=\"form-grid-2\">' +\n      '<div class=\"field\"><label>Employment type *<\u002Flabel><select><option>Casual<\u002Foption><option>Part time<\u002Foption><option>Full time<\u002Foption><\u002Fselect><\u002Fdiv>' +\n      '<div class=\"field\"><label>Employment terms *<\u002Flabel><select><option>Paid<\u002Foption><option>Unpaid<\u002Foption><\u002Fselect><\u002Fdiv>' +\n    '<\u002Fdiv>';\n  list.appendChild(row);\n  updateRoleCount();\n}\n\nfunction removeRoleRow(btn) {\n  btn.closest('.role-row').remove();\n  // re-number\n  var rows = document.querySelectorAll('#role-list .role-row');\n  rows.forEach(function(r, i) {\n    var h = r.querySelector('h5');\n    if (i === 0) {\n      h.textContent = 'Role 1 · Primary';\n      var btn = r.querySelector('.remove-role');\n      if (btn) btn.remove();\n    } else {\n      h.textContent = 'Role ' + (i + 1) + ' · Additional';\n    }\n  });\n  updateRoleCount();\n}\n\nfunction updateRoleCount() {\n  var n = document.querySelectorAll('#role-list .role-row').length;\n  var lbl = document.getElementById('role-count-label');\n  if (lbl) lbl.textContent = n + (n === 1 ? ' role' : ' roles');\n}\n\nfunction toggleHandoverChannel(which, checked) {\n  if (which === 'email') {\n    regState.handoverEmail = checked;\n    document.getElementById('handover-email').classList.toggle('checked', checked);\n  } else {\n    regState.handoverSms = checked;\n    document.getElementById('handover-sms').classList.toggle('checked', checked);\n  }\n}\n\n// ==================== MAGIC LINK PREVIEW (stable employee experience) ====================\nfunction finishHandover() {\n  document.getElementById('modal-handover-sent').classList.add('open');\n}\nfunction startMagicLinkPreview() {\n  go('screen-magic-email');\n}\nfunction goMagic(step) {\n  go('screen-magic-' + step);\n  window.scrollTo({top:0, behavior:'instant'});\n}\nfunction exitMagicPreview() {\n  submitAddEmployee();\n}\nfunction toggleMagicCheck(row, inputId) {\n  var input = document.getElementById(inputId);\n  if (!input) return;\n  input.checked = !input.checked;\n  row.classList.toggle('checked', input.checked);\n}\nfunction clearSig() {\n  var s = document.getElementById('magic-sig');\n  if (!s) return;\n  if (s.classList.contains('signed')) {\n    s.classList.remove('signed');\n    s.textContent = 'Tap to sign with your finger';\n    setTimeout(function(){ s.classList.add('signed'); s.textContent = 'Emma Harris'; }, 700);\n  }\n}\n\n// ==================== PROFILE TABS ====================\nfunction switchProfileTab(which) {\n  ['overview','roles','completed','available'].forEach(function(k) {\n    var tab = document.getElementById('ptab-' + k);\n    var pane = document.getElementById('ppane-' + k);\n    if (tab) tab.classList.toggle('active', k === which);\n    if (pane) pane.classList.toggle('active', k === which);\n  });\n}\n\n// ==================== TWEAKS PANEL ====================\nwindow.tweakState = { photoResult: 'pass', multiRolePreset: false, otherTrainersPreset: false };\n\nfunction buildTweaksPanel() {\n  if (document.getElementById('tweaks-panel')) return;\n  var panel = document.createElement('div');\n  panel.id = 'tweaks-panel';\n  panel.innerHTML =\n    '<div clas }\n\nfunction tw_triggerNi16() {\n  empState.showNi16Alert = true;\n  setViewingAs('Alan King', 'Trainer');\n  go('screen-employees');\n  renderEmpListBanners();\n  closeTweaks();\n}\nfunction tw_triggerLeftStable() {\n  empState.showTrainerLeftAlert = true;\n  setViewingAs('Alan King', 'Trainer');\n  go('screen-employees');\n  renderEmpListBanners();\n  closeTweaks();\n}\n\nfunction tw_setSeg(containerId, idx) {\n  var c = document.getElementById(containerId);\n  if (!c) return;\n  var btns = c.querySelectorAll('button');\n  btns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });\n}\nfunction tw_setMethod(v) {\n  tw_setSeg('tw-method', v === 'trainer' ? 0 : 1);\n  selectMethod(v);\n}\nfunction tw_setPhoto(v) {\n  tw_setSeg('tw-photo', v === 'pass' ? 0 : (v === 'fail' ? 1 : 2));\n  window.tweakState.photoResult = v;\n  // override the upload rotation\n  window.__idPhotoMode = (v === 'pass' ? 0 : (v === 'fail' ? 1 : 2));\n}\nfunction tw_setOther(v) {\n  tw_setSeg('tw-other', v ? 1 : 0);\n  window.tweakState.otherTrainersPreset = v;\n  var toggle = document.getElementById('other-trainer-toggle');\n  if (toggle) {\n    var btns = toggle.querySelectorAll('button');\n    var target = v ? btns[1] : btns[0];\n    if (target) toggleOtherTrainer(target, v);\n  }\n}\nfunction tw_setRoles(v) {\n  tw_setSeg('tw-roles', v ? 1 : 0);\n  window.tweakState.multiRolePreset = v;\n  var list = document.getElementById('role-list');\n  if (!list) return;\n  // Reset to just one row, then add second if needed\n  while (list.children.length > 1) list.lastChild.remove();\n  if (v) addRoleRow();\n}\nfunction tw_jumpProfile(tab) {\n  go('screen-emp-profile');\n  setTimeout(function(){ switchProfileTab(tab); }, 50);\n}\n\nfunction openTweaks() {\n  buildTweaksPanel();\n  document.getElementById('tweaks-panel').classList.add('open');\n}\nfunction closeTweaks() {\n  var p = document.getElementById('tweaks-panel');\n  if (p) p.classList.remove('open');\n  try { window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); } catch(e) {}\n}\n\n// Edit mode protocol — register listener BEFORE announcing\nwindow.addEventListener('message', function(e) {\n  if (!e || !e.data) return;\n  if (e.data.type === '__activate_edit_mode') openTweaks();\n  if (e.data.type === '__deactivate_edit_mode') {\n    var p = document.getElementById('tweaks-panel');\n    if (p) p.classList.remove('open');\n  }\n});\ntry { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e) {}\n\nfunction submitUpdateEmp() {\n  empState.showUpdateBanner = true;\n  go('screen-emp-profile');\n  renderProfileBanners();\n}\n\nfunction submitReplacementPass() {\n  empState.showReplacementBanner = true;\n  go('screen-emp-profile');\n  renderProfileBanners();\n}\n\nfunction submitUpdatePhoto() {\n  empState.showPhotoUpdatedBanner = true;\n  empState.showPhotoRenewalWarning = false;\n  go('screen-emp-profile');\n  renderProfileBanners();\n}\n\nfunction openReinstateModal(name, ser) {\n  document.getElementById('reinstate-name').textContent = name;\n  document.getElementById('reinstate-ser').textContent = ser;\n  document.getElementById('modal-reinstate').classList.add('open');\n}\nfunction confirmReinstate() {\n  closeModal('modal-reinstate');\n  empState.showWelcomeBanner = true;\n  go('screen-employees');\n  renderEmpListBanners();\n}\n\nfunction exportEmployeesCsv() {\n  // Lightweight stub — in real product this would stream a CSV from the server.\n  var rows = [\n    ['SER','Name','Job title','Start date','Employment type','Employment terms','Pass expiry','Photo renewal'],\n    ['48273','Adam Browne','Other duties','13/07/2023','Full time','Unpaid','20/07/2026','20/07/2025'],\n    ['52301','Emily Hughes','Stable hand','08/01/2025','Full time','Paid','—','—'],\n    ['11939','James O\\'Connor','Head Lad','15/06/2018','Full time','Paid','22/07/2024','22/07/2024']\n  ];\n  var csv = rows.map(function(r){ return r.map(function(c){ return '\"'+String(c).replace(/\" u002Fdiv><button class=\"banner-close\" onclick=\"document.getElementById(\\'pool-success-banner\\').innerHTML=\\'\\'\">✕<\u002Fbutton><\u002Fdiv>';\n}\n\nfunction empSwitchTab(tab) {\n  var tabEmp = document.getElementById('emp-tab-employees');\n  var tabPool = document.getElementById('emp-tab-pool');\n  if (tabEmp && tabPool) {\n    if (tab === 'pool') {\n      tabEmp.style.color = 'rgba(255,255,255,0.5)';\n      tabEmp.style.borderBottom = '3px solid transparent';\n      tabPool.style.color = 'white';\n      tabPool.style.borderBottom = '3px solid #ed174d';\n    } else {\n      tabEmp.style.color = 'white';\n      tabEmp.style.borderBottom = '3px solid #ed174d';\n      tabPool.style.color = 'rgba(255,255,255,0.5)';\n      tabPool.style.borderBottom = '3px solid transparent';\n    }\n  }\n  // Inner card tabs (always visible)\n  var innerEmp = document.getElementById('inner-tab-employees');\n  var innerPool = document.getElementById('inner-tab-pool2');\n  if (innerEmp && innerPool) {\n    if (tab === 'pool') {\n      innerEmp.style.color = '#989faa';\n      innerEmp.style.fontWeight = '500';\n      innerEmp.style.borderBottom = '3px solid transparent';\n      innerPool.style.color = '#1a2037';\n      innerPool.style.fontWeight = '600';\n      innerPool.style.borderBottom = '3px solid #ed174d';\n    } else {\n      innerEmp.style.color = '#1a2037';\n      innerEmp.style.fontWeight = '600';\n      innerEmp.style.borderBottom = '3px solid #ed174d';\n      innerPool.style.color = '#989faa';\n      innerPool.style.fontWeight = '500';\n      innerPool.style.borderBottom = '3px solid transparent';\n    }\n  }\n  if (tab === 'pool') {\n    document.getElementById('employees-tab-content').style.display = 'none';\n    document.getElementById('pool-tab-content').style.display = 'block';\n  } else {\n    document.getElementById('employees-tab-content').style.display = 'block';\n    document.getElementById('pool-tab-content').style.display = 'none';\n  }\n}\n\nfunction empSubt ;\n}\n\n// ===== Top nav dropdown menus (click to open, click outside / Escape to close) =====\n(function() {\n  var navItems = document.querySelectorAll('.nav-item');\n  navItems.forEach(function(item) {\n    var trigger = item.querySelector('.nav-trigger');\n    if (!trigger) return;\n    trigger.addEventListener('click', function(e) {\n      e.stopPropagation();\n      var wasOpen = item.classList.contains('open');\n      navItems.forEach(function(it) { it.classList.remove('open'); });\n      if (!wasOpen) item.classList.add('open');\n    });\n  });\n  document.addEventListener('click', function(e) {\n    if (!e.target.closest('.nav-item')) {\n      navItems.forEach(function(it) { it.classList.remove('open'); });\n    }\n    if (!e.target.closest('.viewing-as-wrap')) {\n      var w = document.querySelector('.viewing-as-wrap');\n      if (w) w.classList.remove('open');\n    }\n  });\n  document.addEventListener('keydown', function(e) {\n    if (e.key === 'Escape') {\n      navItems.forEach(function(it) { it.classList.remove('open'); });\n      var w = document.querySelector('.viewing-as-wrap');\n      if (w) w.classList.remove('open');\n    }\n  });\n})();\n\nfunction toggleViewingAs(e) {\n  e.stopPropagation();\n  document.querySelector('.viewing-as-wrap').classList.toggle('open');\n}\nfunction setViewingAs(name, role) {\n  document.getElementById('viewing-as-current').textContent = name;\n  document.querySelectorAll('.viewing-as-option').forEach(function(o) {\n    var lbl = (o.querySelector('.viewing-as-name') || {}).textContent || '';\n    o.classList.toggle('active', lbl === name);\n  });\n  document.querySelector('.viewing-as-wrap').classList.remove('open');\n  document.body.setAttribute('data-viewing-role', role || '');\n  document.body.setAttribute('data-viewing-name', name || '');\n  // Katie Butler is the stable-staff persona AND has CS-team super-admin access.\n  // We keep her staff-side UI (data-viewing-role) and add a super-admin flag separately.\n  v
