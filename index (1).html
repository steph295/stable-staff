document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nk:0; }\n.lookup-result-title { font-size:13px; font-weight:600; color:#1f7a3a; margin-bottom:4px; }\n.lookup-result-body { font-size:12px; color:#1a2037; line-height:1.55; }\n.lookup-result-warn { border:1px solid #f3d6a3; background:#fff8ec; border-radius:8px; padding:12px 14px; margin-top:12px; font-size:12px; color:#8a5a17; line-height:1.55; }\n\n.match-candidates { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }\n.match-candidate { display:flex; gap:12px; align-items:center; padding:12px 14px; border:1px solid #e2e6ee; border-radius:8px; background:white; cursor:pointer; text-align:left; font-family:inherit; transition:all 0.15s; }\n.match-candidate:hover { border-color:#BE1337; background:#fafbfc; }\n.match-candidate .mc-avatar { width:36px; height:36px; border-radius:50%; background:#e5e7eb; color:#4b5563; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }\n.match-candidate .mc-main { flex:1; min-width:0; }\n.match-candidate .mc-name { font-size:13px; font-weight:600; color:#1a2037; margin-bottom:2px; }\n.match-candidate .mc-meta { font-size:11px; color:#6b7280; }\n.match-candidate .mc-conf { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; padding:3px 8px; border-radius:10px; flex-shrink:0; }\n.mc-conf.high { background:#e7f6ec; color:#1f7a3a; }\n.mc-conf.med  { background:#fff4d6; color:#8a5a17; }\n\n.lookup-none-btn { width:100%; justify-content:center; padding:9px 14px; font-size:12px; }\n\n.lookup-next-grid { display:flex; flex-direction:column; gap:8px; margin-top:12px; }\n.lookup-next-card { display:flex; gap:12px; align-items:flex-start; padding:14px 16px; border:1px solid #e2e6ee; border-radius:8px; background:white; cursor:pointer; text-align:left; font-family:inherit; transition:all 0.15s; }\n.lookup-next-card:hover { border-color:#BE1337; background:#fafbfc; }\n.lookup-next-card .lookup-next-icon { width:34px; height:34px; border-radius:8px >Employment &amp; roles<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">4<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Declaration<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">5<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Review<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">6<\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Handover<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step-main\">\n      <h2>How would you like to register this person?<\u002Fh2>\n      <p class=\"page-sub\">You can fill in everything on their behalf, or capture the basics and invite them to complete their own profile.<\u002Fp>\n\n      <div class=\"form-card\">\n        <div class=\"method-grid\">\n          <div class=\"method-card selected\" id=\"method-trainer\" onclick=\"selectMethod('trainer')\">\n            <div class=\"method-radio\"><\u002Fdiv>\n            <div class=\"method-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2\"><\u002Fpath><circle cx=\"9\" cy=\"7\" r=\"4\"><\u002Fcircle><path d=\"M22 11l-3 3-2-2\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <h4>I'll complete it on their behalf<\u002Fh4>\n            <p>Enter all their details now. They'll receive a magic link at the end to confirm and submit the application.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"method-card\" id=\"method-invite\" onclick=\"selectMethod('invite')\">\n            <div class=\"method-radio\"><\u002Fdiv>\n            <div class=\"method-icon\">\n              <svg viewBox=\"0 0 24 24\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"><\u002Fpath><polyline points=\"22 6 12 13 2 6\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fdiv>\n            <h4>Invite them to complete it<\u002Fh4>\n            <p>You'll answer a few trainer-side questions, then we'll send them a link to fill in the rest themselves.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#eef4ff;border:1px solid #c7d6f7;border-radius:8px;padding:12px 14px;display:flex;gap:10px;font-size:12px;color:#1a2037;line-height:1.55\">\n          <svg viewBox=\"0 0 24 24\" style=\"width:14px;height:14px;stroke:#3949a8;fill:none;stroke-width:2;flex-shrink:0;margin-top:2px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"><\u002Fline><\u002Fsvg>\n          <div>Whichever path you choose, the employee themselves will need to confirm their details and submit the final application — they'll receive a secure magic link.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"actions\">\n        <button class=\"btn-back\" onclick=\"go('screen-employees')\">Cancel<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"continueFromMethod()\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== ADD EMPLOYEE — INVITE PATH ==================== -->\n<div class=\"screen\" id=\"screen-add-emp-invite\">\n  <div class=\"flow-bar\"><button class=\"back-btn\" onclick=\"go('screen-add-emp-method')\"><svg viewBox=\"0 0 24 24\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>Back<\u002Fbutton><\u002Fdiv>\n  <div class=\"step-flow-wrap\">\n    <div class=\"step-side\">\n      <div class=\"step-side-label\">Invite employee<\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot done\">✓<\u002Fdiv><div class=\"step-line done\"><\u002Fdiv><\u002Fdiv><div class=\"step-text done\">Get started<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot active\">2<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text active\">Trainer questions<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">3<\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Send invite<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step-main\">\n      <h2>Trainer-side questions<\u002Fh2>\n      <p class=\"page-sub\">Tell us how they'll work at your stable, then we'll invite them to fill in the rest themselves.<\u002Fp>\n\n      <div class=\"form-card\">\n        <h3>Employment basics<\u002Fh3>\n        <div class=\"form-grid-2\">\n          <div class=\"field\"><label>Start date *<\u002Flabel><input type=\"text\" placeholder=\"DD/MM/YYYY\"><\u002Fdiv>\n          <div class=\"field\"><label>Job title *<\u002Flabel><select><option>Select<\u002Foption><option>Stable Hand / Lad<\u002Foption><option>Head Lad / Head Person<\u002Foption><option>Work Rider<\u002Foption><option>Apprentice Jockey<\u002Foption><option>Other duties<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-grid-2\">\n          <div class=\"field\"><label>Employment type *<\u002Flabel><select><option>Full time<\u002Foption><option>Part time<\u002Foption><option>Casual<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field\"><label>Employment terms *<\u002Flabel><select><option>Paid<\u002Foption><option>Unpaid<\u002Foption><option>Furlough<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"form-card\">\n        <h3>Send the invite to<\u002Fh3>\n        <p style=\"font-size:12px;color:#6b7280;margin:-6px 0 12px\">The employee will receive a magic link to set a password and complete their profile.<\u002Fp>\n        <div class=\"form-grid-2\">\n          <div class=\"field\"><label>Email *<\u002Flabel><input type=\"text\" placeholder=\"name@example.com\"><\u002Fdiv>\n          <div class=\"field\"><label>Mobile phone *<\u002Flabel><input type=\"text\" placeholder=\"07700 900000\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\"><label>Employee's first name (so we can address the invite) *<\u002Flabel><input type=\"text\" placeholder=\"e.g. Emma\" style=\"max-width:300px\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"actions\">\n        <button class=\"btn-back\" onclick=\"go('screen-add-emp-method')\">Back<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"sendInvite()\">Send invite<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== ADD EMPLOYEE — INVITE SUCCESS ==================== -->\n<div class=\"screen\" id=\"screen-add-emp-invite-success\">\n  <div class=\"flow-bar\"><button class=\"back-btn\" style=\"visibility:hidden\">x<\u002Fbutton><\u002Fdiv>\n  <div class=\"success-outer\">\n    <div class=\"success-card\" style=\"text-align:center;max-width:480px;margin:60px auto\">\n      <div style=\"width:64px;height:64px;border-radius:50%;background:#e7f6ec;display:flex;align-items:center;justify-content:center;margin:0 auto 18px\">\n        <svg viewBox=\"0 0 24 24\" style=\"width:30px;height:30px;stroke:#2e8a4e;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"><\u002Fpath><polyline points=\"22 6 12 13 2 6\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fdiv>\n      <h2 style=\"font-size:20px;margin-bottom:8px\">Invite sent<\u002Fh2>\n      <p style=\"font-size:13px;color:#6b7280;line-height:1.55;margin-bottom:20px\">We've sent a magic link to the email and phone you provided. They have <strong>14 days<\u002Fstrong> to set up their profile and submit the application. You'll be notified when they do.<\u002Fp>\n      <div class=\"success-btns\"><button class=\"btn-primary\" onclick=\"go('screen-employees')\">Back to employees<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== ADD EMPLOYEE — RACING HISTORY (trainer path) ==================== -->\n<div class=\"screen\" id=\"screen-add-emp-racing\">\n  <div class=\"flow-bar\"><button class=\"back-btn\" onclick=\"go('screen-add-emp-method')\"><svg viewBox=\"0 0 24 24\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>Back<\u002Fbutton><\u002Fdiv>\n  <div class=\"step-flow-wrap\">\n    <div class=\"step-side\">\n      <div class=\"step-side-label\">Register employee<\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot active\">1<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text active\">Get started<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">2<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Employee details<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">3<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Employment &amp; roles<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">4<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Declaration<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">5<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Review<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">6<\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Handover<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step-main\">\n      <h2>Has this person worked in racing before?<\u002Fh2>\n      <p class=\"page-sub\">If they already hold a SER (Stable Employee Record) we can pull their existing details so you don't re-enter them — and prevents duplicate records.<\u002Fp>\n\n      <div class=\"form-card\">\n        <div class=\"method-grid\" style=\"margin-bottom:18px\">\n          <div class=\"method-card\" id=\"racing-no\" onclick=\"selectRacingHistory('no')\">\n            <div class=\"method-radio\"><\u002Fdiv>\n            <div class=\"method-icon\">\n              <svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg>\n            <\u002Fdiv>\n            <h4>No — first time in racing<\u002Fh4>\n            <p>They're new to the industry. We'll create a fresh SER for them as part of this registration.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"method-card selected\" id=\"racing-yes\" onclick=\"selectRacingHistory('yes')\">\n            <div class=\"method-radio\"><\u002Fdiv>\n            <div class=\"method-icon\">\n              <svg viewBox=\"0 0 24 24\"><polyline points=\"3 11 22 2 13 21 11 13 3 11\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fdiv>\n            <h4>Yes — they've worked in racing<\u002Fh4>\n            <p>Enter their SER number (or look up by name &amp; DOB) and we'll pre-fill their existing details.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"racing-yes-panel\">\n          <h3 style=\"margin-bottom:10px\">Look up their existing record<\u002Fh3>\n\n          <!-- Lookup tabs -->\n          <div class=\"lookup-tabs\">\n            <button type=\"button\" class=\"lookup-tab active\" id=\"lookup-tab-ser\" onclick=\"switchLookupTab('ser')\">SER number<\u002Fbutton>\n            <button type=\"button\" class=\"lookup-tab\" id=\"lookup-tab-namedob\" onclick=\"switchLookupTab('namedob')\">Search by name &amp; DOB<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- SER number tab -->\n          <div id=\"lookup-pane-ser\">\n            <div class=\"form-grid-2\" style=\"align-items:end\">\n              <div class=\"field\"><label>SER number<\u002Flabel><input type=\"text\" id=\"ser-lookup-input\" placeholder=\"e.g. 48273\" oninput=\"resetSerLookup()\"><\u002Fdiv>\n              <div style=\"display:flex;gap:8px;align-items:end;margin-bottom:4px\">\n                <button type=\"button\" class=\"btn-primary\" style=\"padding:9px 16px;font-size:13px\" onclick=\"runSerLookup()\">Look up<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Lookup result: match -->\n            <div id=\"ser-lookup-match\" class=\"lookup-result-match\" style=\"display:none\">\n              <div class=\"lookup-result-icon-ok\"><svg viewBox=\"0 0 24 24\" style=\"width:15px;height:15px;stroke:white;fill:none;stroke-width:3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div class=\"lookup-result-title\">Existing record found<\u002Fdiv>\n                <div class=\"lookup-result-body\">SER <strong>48273<\u002Fstrong> · <strong>James O’Connor<\u002Fstrong> · DOB 14/06/1996 · previously employed by <strong>G. Patterson Racing<\u002Fstrong> (ended 02/2024).<\u002Fdiv>\n                <div class=\"lookup-result-body\" style=\"color:#4b5563;margin-top:6px\">Their personal details, NI number, training history and racehorse pass status will be pre-filled. You'll only need to confirm employment with your stable.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Lookup result: no match for SER -->\n            <div id=\"ser-lookup-none\" class=\"lookup-result-warn\" style=\"display:none\">\n              <strong>No record found for SER <span id=\"ser-lookup-none-num\"><\u002Fspan>.<\u002Fstrong> Double-check the number, or try <a class=\"lookup-link\" onclick=\"switchLookupTab('namedob')\">searching by name &amp; DOB<\u002Fa> instead.\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Name & DOB tab -->\n          <div id=\"lookup-pane-namedob\" style=\"display:none\">\n            <div class=\"form-grid-3\">\n              <div class=\"field\"><label>First name<\u002Flabel><input type=\"text\" id=\"nd-first\" placeholder=\"e.g. James\" oninput=\"resetNameDobLookup()\"><\u002Fdiv>\n              <div class=\"field\"><label>Last name<\u002Flabel><input type=\"text\" id=\"nd-last\" placeholder=\"e.g. O'Connor\" oninput=\"resetNameDobLookup()\"><\u002Fdiv>\n              <div class=\"field\"><label>Date of birth<\u002Flabel><input type=\"text\" id=\"nd-dob\" placeholder=\"DD/MM/YYYY\" oninput=\"resetNameDobLookup()\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-top:-4px\">\n              <button type=\"button\" class=\"btn-primary\" style=\"padding:9px 16px;font-size:13px\" onclick=\"runNameDobLookup()\">Search<\u002Fbutton>\n              <button type=\"button\" class=\"btn-outline\" style=\"padding:9px 14px;font-size:13px\" onclick=\"resetNameDobForm()\">Clear<\u002Fbutton>\n              <div class=\"lookup-hint\">Tip: first name + DOB is usually enough.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Results: multiple matches -->\n            <div id=\"nd-result-matches\" style=\"display:none;margin-top:14px\">\n              <div class=\"lookup-result-title\" style=\"color:#1f7a3a;margin-bottom:8px\">\n                <span id=\"nd-result-count\">2<\u002Fspan> possible records found\n              <\u002Fdiv>\n              <div class=\"lookup-result-body\" style=\"margin-bottom:10px\">Pick the right person to pre-fill their details. If none of these are them, choose “None of these match”.<\u002Fdiv>\n              <div class=\"match-candidates\" id=\"nd-candidates\"><\u002Fdiv>\n              <button type=\"button\" class=\"btn-outline lookup-none-btn\" onclick=\"showNameDobNoMatch()\">None of these match<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- Results: no matches found -->\n            <div id=\"nd-result-none\" style=\"display:none;margin-top:14px\">\n              <div class=\"lookup-result-warn\" style=\"display:block;margin-bottom:0\">\n                <div style=\"display:flex;gap:10px;align-items:flex-start\">\n                  <svg viewBox=\"0 0 24 24\" style=\"width:18px;height:18px;stroke:#8a5a17;fill:none;stroke-width:2;flex-shrink:0;margin-top:1px\"><circle cx=\"11\" cy=\"11\" r=\"8\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"><\u002Fline><line x1=\"8\" y1=\"11\" x2=\"14\" y2=\"11\"><\u002Fline><\u002Fsvg>\n                  <div style=\"flex:1\">\n                    <div style=\"font-weight:600;color:#1a2037;margin-bottom:4px;font-size:13px\">No matching records<\u002Fdiv>\n                    <div>We searched existing SER records using <span id=\"nd-recap\"><\u002Fspan>. No matches were returned.<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"lookup-next-grid\">\n                <button type=\"button\" class=\"lookup-next-card\" onclick=\"resetNameDobForm()\">\n                  <div class=\"lookup-next-icon\"><svg viewBox=\"0 0 24 24\"><polyline points=\"23 4 23 10 17 10\"><\u002Fpolyline><path d=\"M20.49 15a9 9 0 1 1-2.12-9.36L23 10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div><div class=\"lookup-next-title\">Try a different search<\u002Fdiv><div class=\"lookup-next-sub\">Maybe their first name is spelled differently, or their DOB is slightly off. Edit and search again.<\u002Fdiv><\u002Fdiv>\n                <\u002Fbutton>\n                <button type=\"button\" class=\"lookup-next-card\" onclick=\"openSerSupportModal()\">\n                  <div class=\"lookup-next-icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div><div class=\"lookup-next-title\">I’m sure they have an SER — ask CS to help<\u002Fdiv><div class=\"lookup-next-sub\">Raise a request with the CS team. They can search across name changes &amp; archived records. You can keep registering in the meantime; we’ll merge if a match is found.<\u002Fdiv><\u002Fdiv>\n                <\u002Fbutton>\n                <button type=\"button\" class=\"lookup-next-card\" onclick=\"treatAsFirstTime()\">\n                  <div class=\"lookup-next-icon\"><svg viewBox=\"0 0 24 24\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n                  <div><div class=\"lookup-next-title\">Treat them as new to racing<\u002Fdiv><div class=\"lookup-next-sub\">If you’ve checked and they really don’t have one, we’ll create a fresh SER as part of this registration.<\u002Fdiv><\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Results: confirmed match -->\n            <div id=\"nd-result-confirmed\" class=\"lookup-result-match\" style=\"display:none;margin-top:14px\">\n              <div class=\"lookup-result-icon-ok\"><svg viewBox=\"0 0 24 24\" style=\"width:15px;height:15px;stroke:white;fill:none;stroke-width:3\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div class=\"lookup-result-title\">Record selected<\u002Fdiv>\n                <div class=\"lookup-result-body\" id=\"nd-confirmed-body\"><\u002Fdiv>\n                <button type=\"button\" class=\"btn-clear-link\" style=\"margin-top:6px\" onclick=\"runNameDobLookup()\">Pick a different record<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <div style=\"background:#eef4ff;border:1px solid #c7d6f7;border-radius:8px;padding:12px 14px;display:flex;gap:10px;font-size:12px;color:#1a2037;line-height:1.55;margin-top:14px\">\n          <svg viewBox=\"0 0 24 24\" style=\"width:14px;height:14px;stroke:#3949a8;fill:none;stroke-width:2;flex-shrink:0;margin-top:2px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"><\u002Fline><\u002Fsvg>\n          <div>This replaces manual duplicate-checking later in the flow — if a record exists we'll attach to it from the start, so no merge is needed.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"actions\">\n        <button class=\"btn-back\" onclick=\"go('screen-add-emp-method')\">Back<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"continueFromRacingHistory()\">Continue<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== ADD EMPLOYEE STEP 2 — DETAILS (was step 1) ==================== -->\n<div class=\"screen\" id=\"screen-add-emp-1\">\n  <div class=\"flow-bar\"><button class=\"back-btn\" onclick=\"go('screen-add-emp-racing')\"><svg viewBox=\"0 0 24 24\"><polyline points=\"15 18 9 12 15 6\"><\u002Fpolyline><\u002Fsvg>Back<\u002Fbutton><\u002Fdiv>\n  <div class=\"step-flow-wrap\">\n    <div class=\"step-side\">\n      <div class=\"step-side-label\">Register employee<\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot done\">✓<\u002Fdiv><div class=\"step-line done\"><\u002Fdiv><\u002Fdiv><div class=\"step-text done\">Get started<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot active\">2<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text active\">Employee details<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">3<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Employment &amp; roles<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">4<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Declaration<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">5<\u002Fdiv><div class=\"step-line\"><\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Review<\u002Fdiv><\u002Fdiv>\n      <div class=\"step\"><div class=\"step-col\"><div class=\"step-dot inactive\">6<\u002Fdiv><\u002Fdiv><div class=\"step-text inactive\">Handover<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"step-main\">\n      <h2>Employee details<\u002Fh2>\n      <p class=\"page-sub\">Enter the basic details for this employee. All fields marked * are required.<\u002Fp>\n\n      <div class=\"form-card\">\n        <h3>Personal details<\u002Fh3>\n        <div class=\"form-grid-3\">\n          <div class=\"field\"><label>Title *<\u002Flabel><select><option>Mr<\u002Foption><option>Mrs<\u002Foption><option>Miss<\u002Foption><option>Ms<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field\"><label>Full first name <span style=\"font-weight:400;color:#6b7280\">(matching passport)<\u002Fspan> *<\u002Flabel><input type=\"text\" placeholder=\"e.g. Katherine Anne\"><\u002Fdiv>\n          <div class=\"field\"><label>Full surname <span style=\"font-weight:400;color:#6b7280\">(matching passport)<\u002Fspan> *<\u002Flabel><input type=\"text\" placeholder=\"e.g. Butler\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-grid-2\">\n          <div class=\"field\"><label>Previous surname<\u002Flabel><input type=\"text\" placeholder=\"If applicable\"><\u002Fdiv>\n          <div class=\"field\"><label>Date of birth *<\u002Flabel><input type=\"text\" id=\"emp-dob\" placeholder=\"DD/MM/YYYY\" oninput=\"window.updateNiVisibility &amp;&amp; window.updateNiVisibility()\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-grid-3\">\n          <div class=\"field\"><label>Biological sex *<\u002Flabel><select><option>Select<\u002Foption><option>Male<\u002Foption><option>Female<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field\"><label>Nationality *<\u002Flabel><select><option>Select<\u002Foption><option>British<\u002Foption><option>Irish<\u002Foption><option>Other<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field\" id=\"emp-ni-field\"><label>National Insurance number *<\u002Flabel><input type=\"text\" placeholder=\"AB123456C\"><\u002Fdiv>\n          <div class=\"field\" id=\"emp-ni-under16\" style=\"display:none;grid-column:span 1\">\n            <label style=\"color:#6b7280\">National Insurance number<\u002Flabel>\n            <div style=\"background:#fff8ec;border:1px dashed #f3d6a3;border-radius:6px;padding:9px 12px;font-size:12px;color:#8a5a17;line-height:1.45\">\n              <strong>Not required yet.<\u002Fstrong> NI numbers are issued at age 16 — we’ll request it automatically when they turn 16.\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"form-card\">\n        <h3>ID Photo<\u002Fh3>\n        <p style=\"font-size:12px;color:#6b7280;margin:-6px 0 12px\">Please upload an ID photo of the employee for their Racehorse Attendants Pass application.<\u002Fp>\n        <div style=\"background:#eef2ff;border:1px solid #dbe2ff;border-radius:8px;padding:14px 16px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start\">\n          <svg viewBox=\"0 0 24 24\" style=\"width:16px;height:16px;stroke:#2563eb;fill:none;stroke-width:2;flex-shrink:0;margin-top:2px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg>\n          <div style=\"font-size:12px;color:#1a2037;line-height:1.55\">\n            <div style=\"font-weight:600;margin-bottom:4px\">ID Photo Requirements<\u002Fdiv>\n            <ul style=\"margin:0;padding-left:16px\">\n              <li>The photograph should be a recognisable likeness of you.<\u002Fli>\n              <li>Head and shoulders should be in close up, with face clearly visible and filling approximately 70% of the frame (passport-style).<\u002Fli>\n              <li>The photograph must be in sharp focus.<\u002Fli>\n              <li>Ensure the face is not obscured by hats or hair.<\u002Fli>\n              <li>The file must be .jpg, .png, .bmp or .gif and must not exceed 4MB.<\u002Fli>\n              <li>Photographs will be rejected if not appropriate and a more suitable one will be requested.<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Empty drop zone -->\n        <div id=\"id-photo-empty\" onclick=\"document.getElementById('id-photo-file').click()\" style=\"border:2px dashed #c7cbd1;border-radius:8px;padding:28px;text-align:center;cursor:pointer;background:#f5f7fb;max-width:560px\">\n          <svg viewBox=\"0 0 24 24\" style=\"width:24px;height:24px;stroke:#6b7280;fill:none;stroke-width:1.5;margin:0 auto 10px;display:block\"><path d=\"M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-size:13px;color:#374151;margin-bottom:10px\">Drag and drop file here<br>Or<\u002Fdiv>\n          <button type=\"button\" style=\"background:#0d101c;color:white;border:none;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer\">Browse for file<\u002Fbutton>\n          <input type=\"file\" id=\"id-photo-file\" accept=\".jpg,.jpeg,.png,.bmp,.gif\" style=\"display:none\" onchange=\"window.simulateIdPhotoUpload()\">\n        <\u002Fdiv>\n\n        <!-- Smart-check in progress -->\n        <div id=\"id-photo-checking\" style=\"display:none;border:1px solid #e2e6ee;border-radius:8px;padding:18px;max-width:560px;background:#fff\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <div class=\"id-photo-spinner\" style=\"width:18px;height:18px;border:2px solid #dbe2ff;border-top-color:#2563eb;border-radius:50%;animation:idPhotoSpin 0.8s linear infinite\"><\u002Fdiv>\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:#1a2037\">Running smart photo check…<\u002Fdiv>\n              <div style=\"font-size:12px;color:#6b7280;margin-top:2px\">Checking image against ID photo requirements.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Result: pass -->\n        <div id=\"id-photo-pass\" style=\"display:none;border:1px solid #e2e6ee;border-radius:8px;padding:14px;max-width:560px;background:#fff\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start\">\n            <div style=\"width:120px;height:140px;border-radius:6px;background:linear-gradient(135deg,#cfd6e2,#a8b1c4);background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.18) 0 6px,transparent 6px 12px),linear-gradient(135deg,#cfd6e2,#7a8499);flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;font:11px ui-monospace,monospace;color:#fff;padding:6px;text-align:center\">id photo<br>preview<\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div class=\"id-check-row pass\"><span class=\"id-check-icon pass\">✓<\u002Fspan> Is a recognisable likeness of person<\u002Fdiv>\n              <div class=\"id-check-row pass\"><span class=\"id-check-icon pass\">✓<\u002Fspan> Head &amp; shoulders filling 70% of frame<\u002Fdiv>\n              <div class=\"id-check-row pass\"><span class=\"id-check-icon pass\">✓<\u002Fspan> Face visible &amp; clearly shown<\u002Fdiv>\n              <div class=\"id-check-row pass\"><span class=\"id-check-icon pass\">✓<\u002Fspan> Photo in sharp focus<\u002Fdiv>\n              <div class=\"id-check-row pass\"><span class=\"id-check-icon pass\">✓<\u002Fspan> Acceptable file type &amp; size (JPG, 2.5MB)<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;background:#e7f6ec;border:1px solid #b9e3c4;border-radius:6px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between\">\n            <div style=\"font-size:12px;color:#1f7a3a;display:flex;align-items:center;gap:8px\">\n              <span style=\"width:18px;height:18px;border-radius:50%;background:#2e8a4e;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700\">✓<\u002Fspan>\n              <span><strong>All checks passed<\u002Fstrong> · katie-butler-id.jpg · 2.5MB<\u002Fspan>\n            <\u002Fdiv>\n            <button type=\"button\" onclick=\"window.resetIdPhotoUpload()\" style=\"background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px\"><svg viewBox=\"0 0 24 24\" style=\"width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2\"><polyline points=\"3 6 5 6 21 6\"><\u002Fpolyline><path d=\"M19 6l-2 14H7L5 6\"><\u002Fpath><path d=\"M10 11v6\"><\u002Fpath><path d=\"M14 11v6\"><\u002Fpath><\u002Fsvg>Delete<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Result: fail -->\n        <div id=\"id-photo-fail\" style=\"display:none;border:1px solid #e2e6ee;border-radius:8px;padding:14px;max-width:560px;background:#fff\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start\">\n            <div style=\"width:120px;height:140px;border-radius:6px;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,0.12) 0 6px,transparent 6px 12px),linear-gradient(135deg,#5a6577,#2d3340);flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;font:11px ui-monospace,monospace;color:#fff;padding:6px;text-align:center;filter:blur(0.6px)\">id photo<br>preview<\u002Fdiv>\n            <div style=\"flex:1;min-width -radius:6px;font-size:13px;background:#fff;color:#374151\">\n        <option>Select issue…<\u002Foption>\n        <option>Workplace concern<\u002Foption>\n        <option>Health &amp; safety<\u002Foption>\n        <option>Pay or hours<\u002Foption>\n        <option>Pass / paperwork issue<\u002Foption>\n        <option>Discrimination or harassment<\u002Foption>\n        <option>Other<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <div style=\"margin-bottom:14px\">\n      <label style=\"font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:6px\">Further details *<\u002Flabel>\n      <textarea placeholder=\"Describe the issue…\" style=\"width:100%;min-height:90px;padding:10px 11px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical\"><\u002Ftextarea>\n    <\u002Fdiv>\n    <div style=\"border:2px dashed #d1d5db;border-radius:8px;padding:22px;text-align:center;background:#fafbfd;margin-bottom:14px\">\n      <svg viewBox=\"0 0 24 24\" style=\"width:22px;height:22px;stroke:#6b7280;fill:none;stroke-width:1.5;margin:0 auto 8px;display:block\"><path d=\"M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48\"><\u002Fpath><\u002Fsvg>\n      <div style=\"font-size:13px;color:#374151;margin-bottom:8px\">Drag and drop file here<br>Or<\u002Fdiv>\n      <button type=\"button\" style=\"background:#0d101c;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer\">Browse for file<\u002Fbutton>\n      <div style=\"font-size:11px;color:#9aa1ad;margin-top:8px\">Accepted file types: JPG, PNG, BMP, GIF — Max 44MB<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-actions\">\n      <button class=\"btn-back\" onclick=\"closeModal('modal-report-issue')\">Cancel<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"submitReportIssue()\">Submit<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-size:11px;color:#9aa1ad;text-align:center;margin-top:10px\">Reported issues are fully confidential. Messages are kept private within Racing Digital.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Cancel pass modal -->\n<div class=\"modal-overlay\" id=\"modal-cancel-pass\">\n  <div class=\"modal\">\n    <button class=\"modal-x-close\" onclick=\"closeModal('modal-cancel-pass')\" aria-label=\"Close\">✕<\u002Fbutton>\n    <div class=\"modal-icon\" style=\"background:#fef2f2;color:#dc2626\"><svg viewBox=\"0 0 24 24\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n    <h3>Cancel racehorse pass?<\u002Fh3>\n    <p class=\"modal-sub\">This action cannot be undone<\u002Fp>\n    <div class=\"modal-warn\">\n      <svg viewBox=\"0 0 24 24\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n      <p>The pass for <strong>Adam Browne<\u002Fstrong> (SER 48273) will be cancelled immediately. To handle racehorses on raceday after this, the employee will need a new application and the £20.10 fee will apply again.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"modal-actions\">\n      <button class=\"btn-back\" onclick=\"closeModal('modal-cancel-pass')\">Keep pass active<\u002Fbutton>\n      <button class=\"btn-primary\" style=\"background:#dc2626\" onclick=\"confirmCancelPass()\">Cancel pass<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== CS SUPPORT REQUEST (SER lookup) ==================== -->\n<div class=\"modal-overlay\" id=\"modal-ser-support\">\n  <div class=\"modal\" style=\"max-width:520px\">\n    <button class=\"modal-x-close\" onclick=\"closeModal('modal-ser-support')\" aria-label=\"Close\">✕<\u002Fbutton>\n    <div class=\"modal-icon\" style=\"background:#fdebef;color:#BE1337\"><svg viewBox=\"0 0 24 24\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <h3>Ask CS to find their SER<\u002Fh3>\n    <p class=\"modal-sub\">CS can search across name changes, married/maiden names and archived records that the trainer-side search can’t see.<\u002Fp>\n    <div style=\"background:#eef4ff;border:1px solid #c7d6f7;border-radius:8px;padding:11px 14px;margin:10px 0;font-size:12px;color:#1a2037;line-height:1.55\">\n      <strong>You can keep going.<\u002Fstrong> Carry on with this registration as if they were new — if CS finds an existing SER we’ll merge the records and notify you. No duplicates will be created in race-day data.\n    <\u002Fdiv>\n    <div class=\"form-card\" style=\"box-shadow:none;border:1px solid #e2e6ee;padding:14px 16px;margin-bottom:0\">\n      <div class=\"form-grid-2\">\n        <div class=\"field\"><label>Details you've already tried<\u002Flabel><input type=\"text\" id=\"sup-tried\" placeholder=\"auto-filled from your search\" readonly=\"\"><\u002Fdiv>\n        <div class=\"field\"><label>Approximate years in racing (optional)<\u002Flabel><input type=\"text\" placeholder=\"e.g. 2015–2022\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\"><label>Any aliases, maiden / previous names?<\u002Flabel><input type=\"text\" placeholder=\"e.g. previously known as Smith\"><\u002Fdiv>\n      <div class=\"field\"><label>Other context for CS (optional)<\u002Flabel><textarea placeholder=\"e.g. They mentioned working at a stable in Yorkshire around 2018.\" style=\"min-height:60px\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-actions\" style=\"margin-top:14px\">\n      <button class=\"btn-back\" onclick=\"closeModal('modal-ser-support')\">Cancel<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"submitSerSupport()\">Send request to CS<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== I NO LONGER WORK HERE (employee) ==================== -->\n<div class=\"modal-overlay\" id=\"modal-leave-stable\">\n  <div class=\"modal\" style=\"max-width:520px\">\n    <button class=\"modal-x-close\" onclick=\"closeModal('modal-leave-stable')\" aria-label=\"Close\">✕<\u002Fbutton>\n    <div class=\"modal-icon\" style=\"background:#fff7e6;color:#d28a2b\"><svg viewBox=\"0 0 24 24\"><path d=\"M16 17l5-5-5-5\"><\u002Fpath><path d=\"M21 12H9\"><\u002Fpath><path d=\"M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <h3>I no longer work at this stable<\u002Fh3>\n    <p class=\"modal-sub\">Let your trainer know your employment has ended<\u002Fp>\n    <div style=\"background:#eef4ff;border:1px solid #c7d6f7;border-radius:8px;padding:12px 14px;margin:12px 0;font-size:12px;color:#1a2037;line-height:1.55\">\n      <strong>This doesn’t end your employment immediately.<\u002Fstrong> We’ll notify your trainer (<strong>Alan King<\u002Fstrong>) so they can confirm and record the official end date. You’ll get an alert when they do — usually within a few days.\n    <\u002Fdiv>\n    <div class=\"form-card\" style=\"box-shadow:none;border:1px solid #e2e6ee;padding:14px 16px;margin-bottom:0\">\n      <div class=\"form-grid-2\">\n        <div class=\"field\"><label>Last day worked<\u002Flabel><input type=\"text\" placeholder=\"DD/MM/YYYY\" value=\"12/05/2026\"><\u002Fdiv>\n        <div class=\"field\"><label>Reason (optional)<\u002Flabel><select><option>Prefer not to say<\u002Foption><option>Moved house<\u002Foption><option>Career change<\u002Foption><option>Health / personal<\u002Foption><option>End of contract<\u002Foption><option>Other<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"field\"><label>Anything else your trainer should know? (optional)<\u002Flabel><textarea placeholder=\"e.g. when to expect your final pay\" style=\"min-height:60px\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-actions\" style=\"margin-top:14px\">\n      <button class=\"btn-back\" onclick=\"closeModal('modal-leave-stable')\">Cancel<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"submitLeaveStable()\">Notify trainer<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ==================== TRAINER CONFIRM EMPLOYEE LEFT ==================== -->\n<div class=\"modal-overlay\" id=\"modal-confirm-left\">\n  <div class=\"modal\" style=\"max-width:540px\">\n    <button class=\"modal-x-close\" onclick=\"closeModal('modal-confirm-left')\" aria-label=\"Close\">✕<\u002Fbutton>\n    <div class=\"modal-icon\" style=\"background:#fff7e6;color:#d28a2b\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n    <h3>Katie Butler flagged she no longer works here<\u002Fh3>\n    <p class=\"modal-sub\">She submitted this on <strong>14/05/2026<\u002Fstrong> · Last day worked: <strong>12/05/2026<\u002Fstrong><\u002Fp>\n    <div style=\"background:#f9fafa;border:1px solid #e2e6ee;border-radius:8px;padding:12px 14px;margin:12px 0;font-size:12px;color:#1a2037;line-height:1.55\">\n      <div style=\"font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px\">Reason given<\u002Fdiv>\n      End of contract — <em>“Thanks for everything. Final pay can go to my usual account.”<\u002Fem>\n    <\u002Fdiv>\n    <div style=\"background:#fdebef;border:1px solid #f5c1cc;border-radius:8px;padding:12px 14px;margin-bottom:0;font-size:12px;color:#3a1010;line-height:1.55\">\n      <strong>Nothing changes until you confirm.<\u002Fstrong> If you confirm, her employment will end on 12/05/2026 and the racehorse pass will be cancelled. If you dispute, she stays on your register and we’ll prompt her to discuss it with you.\n    <\u002Fdiv>\n    <div class=\"modal-actions\" style=\"margin-top:14px;display:flex;gap:8px;justify-content:flex-end\">\n      <button class=\"btn-outline\" style=\"color:#b91c1c;border-color:#fecaca\" onclick=\"disputeLeaveStable()\">Dispute<\u002Fbutton>\n      <button class=\"btn-back\" onclick=\"closeModal('modal-confirm-left')\">Decide later<\u002Fbutton>\n      <button class=\"btn-primary\" onclick=\"confirmLeaveStable()\">Confirm &amp; terminate<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Pass card panel — Digital race card -->\n<div class=\"pass-panel-overlay\" id=\"pass-overlay\" onclick=\"closePassPanel()\"><\u002Fdiv>\n<div class=\"pass-panel\" id=\"pass-panel\">\n  <div class=\"pass-panel-head\">\n    <h3>Digital race card<\u002Fh3>\n    <button class=\"pass-panel-close\" onclick=\"closePassPanel()\">✕<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"pass-panel-body\">\n    <div class=\"pass-card-mockup pass-card-mockup-v2\">\n      <div class=\"pass-card-header\">\n        <div>\n          <div class=\"pass-card-label\">BHA Authorised<\u002Fdiv>\n          <div class=\"pass-card-title\">Racehorse Attendant Pass<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pass-card-photo-img\" id=\"pass-photo\" style=\"background:rgba(255,255,255,0.15) url(&quot;data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'&gt;&lt;circle cx='16' cy='12' r='5' fill='%23e8c8a8'/&gt;&lt;path d='M3 32 C3 22 9 19 16 19 C23 19 29 22 29 32 Z' fill='%234a6580'/&gt;&lt;/svg&gt;&quot;) center/cover\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pass-card-name\" id=\"pass-name\">Adam Browne<\u002Fdiv>\n      <div class=\"pass-card-ser\" id=\"pass-ser\">SER · 48273<\u002Fdiv>\n\n      <!-- QR + barcode -->\n      <div class=\"pass-qr\" id=\"pass-qr-wrap\">\n        <svg view ap(function(e) {\n    var sel = !!poolSelected[e.ser];\n    return '<tr class=\"' + (sel?'selected':'') + '\">' +\n      '<td><div class=\"pool-cb ' + (sel?'checked':'') + '\" onclick=\"poolToggle(\\'' + e.ser + '\\')\"><\u002Fdiv><\u002Ftd>' +\n      '<td>' + e.ser + '<\u002Ftd>' +\n      '<td><strong>' + e.name + '<\u002Fstrong><\u002Ftd>' +\n      '<td>' + e.type + '<\u002Ftd>' +\n      '<td>' + e.job + '<\u002Ftd>' +\n      '<td>' + e.start + '<\u002Ftd>' +\n      '<td>' + e.end + '<\u002Ftd>' +\n    '<\u002Ftr>';\n  }).join('');\n}\n\nfunction poolToggle(ser) {\n  poolSelected[ser] = !poolSelected[ser];\n  poolRenderEmployees();\n  poolUpdateNext1();\n  poolUpdateAllCb();\n}\n\nfunction poolToggleAll() {\n  var allSelected = POOL_EMPLOYEES.every(function(e){ return poolSelected[e.ser]; });\n  POOL_EMPLOYEES.forEach(function(e) { poolSelected[e.ser] = !allSelected; });\n  poolRenderEmployees();\n  poolUpdateNext1();\n  poolUpdateAllCb();\n}\n\nfunction poolUpdateAllCb() {\n  var cb = document.getElementById('pool1-cb-all');\n  if (!cb) return;\n  var allSelected = POOL_EMPLOYEES.every(function(e){ return poolSelected[e.ser]; });\n  cb.classList.toggle('checked', allSelected);\n}\n\nfunction poolUpdateNext1() {\n  var any = Object.keys(poolSelected).some(function(k){ return poolSelected[k]; });\n  document.getElementById('pool1-next').disabled = !any;\n}\n\nfunction poolGoStep2() {\n  // Initialize amounts for selected employees\n  var selected = POOL_EMPLOYEES.filter(function(e){ return poolSelected[e.ser]; });\n  selected.forEach(function(e){\n    if (!poolAmounts[e.ser]) poolAmounts[e.ser] = { pct:0, amount:0 };\n  });\n  poolMode = 'pound';\n  poolRenderAmounts();\n  poolUpdateModeRadios();\n  poolUpdateTotals();\n  poolUpdateNext2();\n  go('screen-pool-2');\n}\n\nfunction poolRenderAmounts() {\n  var tb = document.getElementById('pool2-tbody');\n  if (!tb) return;\n  var selected = POOL_EMPLOYEES.filter(function(e){ return poolSelected[e.ser]; });\n  tb.innerHTML = selected.map(function(e) {\n    var amt = poolAmounts[e.ser] || { pct:0, amount:0 };\n    var pctDisplay = amt.pct > 0 ? amt.pct.toFixed(2) : '0.00';\n    var pctClass = amt.pct > 0 ? 'pool-pct-cell has-value' : 'pool-pct-cell';\n    var amtDisplay = amt.amount > 0 ? '£' + amt.amount.toFixed(2) : '';\n    if (poolMode === 'pct') {\n      return '<tr>' +\n        '<td>' + e.ser + '<\u002Ftd>' +\n        '<td><strong>' + e.name + '<\u002Fstrong><\u002Ftd>' +\n        '<td>' + e.type + '<\u002Ftd>' +\n        '<td>' + e.job + '<\u002Ftd>' +\n        '<td>' + e.start + '<\u002Ftd>' +\n        '<td>' + e.end + '<\u002Ftd>' +\n        '<td style=\"text-align:right\"><input type=\"text\" class=\"pool-amount-input percent\" value=\"' + (amt.pct>0?amt.pct.toFixed(2):'0.00') + '\" onchange=\"poolEditPct(\\'' + e.ser + '\\',this.value)\"> %<\u002Ftd>' +\n        '<td style=\"text-align:right\" class=\"pool-pct-cell ' + (amt.amount>0?'has-value':'') + '\">£' + amt.amount.toFixed(2) + '<\u002Ftd>' +\n      '<\u002Ftr>';\n    } else {\n      return '<tr>' +\n        '<td>' + e.ser + '<\u002Ftd>' +\n        '<td><strong>' + e.name + '<\u002Fstrong><\u002Ftd>' +\n        '<td>' + e.type + '<\u002Ftd>' +\n        '<td>' + e.job + '<\u002Ftd>' +\n        '<td>' + e.start + '<\u002Ftd>' +\n        '<td>' + e.end + '<\u002Ftd>' +\n        '<td style=\"text-align:right\" class=\"' + pctClass + '\">' + pctDisplay + '%<\u002Ftd>' +\n        '<td style=\"text-align:right\"><input type=\"text\" class=\"pool-amount-input\" ' + (poolMode==='equal'?'readonly':'') + ' value=\"' + (amt.amount>0?'£'+amt.amount.toFixed(2):'£ 0.00') + '\" onchange=\"poolEditAmt(\\'' + e.ser + '\\',this.value)\"><\u002Ftd>' +\n      '<\u002Ftr>';\n    }\n  }).join('');\n}\n\nfunction poolEditAmt(ser, raw) {\n  var v = parseFloat(String(raw).replace(/[^0-9.]/g,'')) || 0;\n  poolAmounts[ser].amount = v;\n  poolAmounts[ser].pct = (v / POOL_TOTAL) * 100;\n  poolRenderAmounts();\n  poolUpdateTotals();\n  poolUpdateNext2();\n}\nfunction poolEditPct(ser, raw) {\n  var v = parseFloat(String(raw).replace(/[^0-9.]/g,'')) || 0;\n  poolAmounts[ser].pct = v;\n  poolAmounts[ser].amount = (v/100) * POOL_TOTAL;\n  poolRenderAmounts();\n  poolUpdateTotals();\n  poolUpdateNext2();\n}\n\nfunction poolSetMode(mode) {\n  poolMode = mode;\n  if (mode === 'equal') {\n    var selected = POOL_EMPLOYEES.filter(function(e){ return poolSelected[e.ser]; });\n    var n = selected.length;\n    var per = POOL_TOTAL / n;\n    var perPct = 100 / n;\n    selected.forEach(function(e){\n      poolAmounts[e.ser] = { amount: per, pct: perPct };\n    });\n  }\n  poolUpdateModeRadios();\n  poolRenderAmounts();\n  poolUpdateTotals();\n  poolUpdateNext2();\n}\n\nfunction poolUpdateModeRadios() {\n  ['pound','pct','equal'].forEach(function(m){\n    var el = document.getElementById('pool2-mode-' + m);\n    if (el) el.classList.toggle('active', poolMode === m);\n  });\n}\n\nfunction poolUpdateTotals() {\n  var sum = 0;\n  Object.keys(poolAmounts).forEach(function(k){\n    if (poolSelected[k]) sum += poolAmounts[k].amount;\n  });\n  var pct = (sum / POOL_TOTAL) * 100;\n  var remain = POOL_TOTAL - sum;\n  var totalEl = document.getElementById('pool2-total-val');\n  var pctEl = document.getElementById('pool2-pct-val');\n  var remainEl = document.getElementById('pool2-remain-display');\n  if (totalEl) {\n    totalEl.textContent = '£' + sum.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});\n    totalEl.className = 'val ' + (sum===0?'zero':(Math.abs(sum-POOL_TOTAL)<0.01?'complete':'partial'));\n  }\n  if (pctEl) {\n    pctEl.textContent = (Math.round(pct*10)/10) + '%';\n    pctEl.className = 'val ' + (sum===0?'zero':(Math.abs(sum-POOL_TOTAL)<0.01?'complete':'partial'));\n  }\n  if (remainEl) {\n    remainEl.textContent = '£' + remain.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});\n    remainEl.style.color = Math.abs(remain)<0.01 ? '#5fd398' : '#ff5e7d';\n  }\n}\n\nfunction poolSetCriteria(v) {\n  poolCriteria = v;\n  document.getElementById('pool2-crit-no').classList.toggle('active', v==='no');\n  document.getElementById('pool2-crit-yes').classList.toggle('active', v==='yes');\n  // Add filled circle for selected\n  ['no','yes'].forEach(function(k){\n    var el = document.getElementById('pool2-crit-'+k);\n    el.style.borderColor = (poolCriteria===k) ? '#1a2037' : '#c0c5ce';\n    el.innerHTML = (poolCriteria===k) ? '<span style=\"width:9px;height:9px;border-radius:50%;background:#1a2037\"><\u002Fspan>' : '';\n    el.style.display = 'inline-flex';\n    el.style.alignItems = 'center';\n    el.style.justifyContent = 'center';\n  });\n  document.getElementById('pool2-upload').style.display = (v==='yes') ? '' : 'none';\n  poolUpdateNext2();\n}\n\nfunction poolUpdateNext2() {\n  var sum = 0;\n  Object.keys(poolAmounts).forEach(function(k){\n    if (poolSelected[k]) sum += poolAmounts[k].amount;\n  });\n  var fullDistributed = Math.abs(sum - POOL_TOTAL) < 0.01;\n  var hasCrit = poolCriteria !== null;\n  document.getElementById('pool2-next').disabled = !(fullDistributed && hasCrit);\n}\n\nfunction poolGoStep3() {\n  poolRenderReview('pool3-tbody', 'pool3-total-val');\n  poolValidate3();\n  go('screen-pool-3');\n}\n\nfunction poolRenderReview(tbodyId, totalId) {\n  var tb = document.getElementById(tbodyId);\n  if (!tb) return;\n  var selected = POOL_EMPLOYEES.filter(function(e){ return poolSelected[e.ser]; });\n  var sum = 0;\n  tb.innerHTML = selected.map(function(e) {\n    var amt = poolAmounts[e.ser] || { pct:0, amount:0 };\n    sum += amt.amount;\n    return '<tr>' +\n      '<td>' + e.ser + '<\u002Ftd>' +\n      '<td><strong>' + e.name + '<\u002Fstrong><\u002Ftd>' +\n      '<td>' + e.type + '<\u002Ftd>' +\n      '<td>' + e.job + '<\u002Ftd>' +\n      '<td>' + e.start + '<\u002Ftd>' +\n      '<td>' + e.end + '<\u002Ftd>' +\n      '<td style=\"text-align:right\">' + (Math.round(amt.pct*10)/10) + '%<\u002Ftd>' +\n      '<td style=\"text-align:right\">£' + amt.amount.toFixed(2) + '<\u002Ftd>' +\n    '<\u002Ftr>';\n  }).join('');\n  document.getElementById(totalId).textContent = '£' + sum.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});\n}\n\nfunction poolValidate3() {\n  var name = (document.getElementById('pool3-name').value || '').trim();\n  var date = (document.getElementById('pool3-paydate').value || '').trim();\n  document.getElementById('pool3-submit').disabled = !(name && date);\n}\n\nfunction poolSubmit() {\n  var name = document.getElementById('pool3-name').value || 'Audrey Wilson';\n  var date = document.getElementById('pool3-paydate').value || '17/05/2026';\n  document.getElementById('pool4-name').textContent = name;\n  document.getElementById('pool4-paydate').textContent = date;\n  document.getElementById('pool4-paydate2').textContent = date;\n  poolRenderReview('pool4-tbody', 'pool4-total-val');\n  go('screen-pool-4');\n}\n\nfunction poolBackToDashboard() {\n  // Mark return submitted in the table & show banner\n  empState.showPoolBanner = true;\n  go('screen-employees');\n  // Switch the inner tab to Pool Money\n  setTimeout(function(){\n    if (typeof empSwitchTab === 'function') empSwitchTab('pool');\n    var banner = document.getElementById('pool-success-banner');\n    if (banner) banner.innerHTML = '<div class=\"banner banner-success\" style=\"margin:14px 0\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Stable Pool Money Return submitted successfully<\u002Fdiv><button class=\"banner-close\" onclick=\"document.getElementById(\\'pool-success-banner\\').innerHTML=\\'\\'\">✕<\u002Fbutton><\u002Fdiv>';\n    // Update the latest row to show as Submitted\n    var firstRow = document.querySelector('#pool-tab-content tbody tr:first-child');\n    if (firstRow) {\n      firstRow.innerHTML = '<td>01/02/2025 - 30/04/2025<\u002Ftd><td>£21,984.51<\u002Ftd><td>31/05/2025<\u002Ftd><td>06/05/2026<\u002Ftd><td>06/05/2026<\u002Ftd><td><span class=\"badge-submitted\">Submitted<\u002Fspan><\u002Ftd><td><a class=\"pass-link\" onclick=\"go(\\'screen-pool-4\\')\">View<\u002Fa><\u002Ftd>';\n    }\n  }, 80);\n}\n<\u002Fscript>\n\n<script>\n// ==================== EMPLOYEE MANAGEMENT JS ====================\n\nvar empState = {\n  duplicatesResolved: false,\n  passActive: true,\n  showWelcomeBanner: false,\n  showTerminationBanner: false,\n  showPoolBanner: false,\n  showPassCancelBanner: false,\n  showUpdateBanner: false,\n  showPassApplyBanner: false,\n  showReplacementBanner: false,\n  showPhotoUpdatedBanner: false,\n  showPhotoRenewalWarning: true,\n  showReinstateBanner: false,\n  showDuplicatesMergedBanner: false,\n  showLeftStableSubmitted: false,    // employee-side after flagging\n  showTrainerLeftAlert: false,       // trainer-side: employee flagged they left\n  showLeaveDisputedBanner: false,    // trainer-side: dispute confirmation\n  showNi16Alert: false,              // trainer-side: NI now required\n  showNiRequestedBanner: false       // trainer-side: NI request sent\n};\n\nvar empData = {\n  '19203': { name:'Richard Adams', initials:'RA', color:'#e0e7ff', textColor:'#3730a3' },\n  '48273': { name:'Adam Browne', initials:'AB', color:'#dbeafe', textColor:'#1e40af' },\n  '23928': { name:'Katie Butler', initials:'KB', color:'#fef3c7', textColor:'#92400e' },\n  '19392': { name:'Daniel Carey', initials:'DC', color:'#dcfce7', textColor:'#15803d' },\n  '11939': { name:'Andrew Carroll', initials:'AC', color:'#ede9fe', textColor:'#6d28d9' },\n  '51842': { name:'Sarah Mitchell', initials:'SM', color:'#fce7f3', textColor:'#be185d' },\n  '49102': { name:'James Donovan', initials:'JD', color:'#fef3c7', textColor:'#92400e' },\n  '52301': { name:'Emily Hughes', initials:'EH', color:'#dcfce7', textColor:'#15803d', noPass:true },\n  '50194': { name:'Thomas Kelly', initials:'TK', color:'#ede9fe', textColor:'#6d28d9' }\n};\n\nfunction goEmployeeProfile(id) {\n  var d = empData[id];\n  if (!d) return;\n  document.getElementById('profile-card-name').textContent = d.name;\n  document.getElementById('profile-card-ser').textContent = id;\n  var photo = document.getElementById('profile-card-photo');\n  photo.textContent = d.initials;\n  photo.style.background = d.color;\n  photo.style.color = d.textColor;\n  // Reset body sections back to the trainer-side default (Adam Browne layout)\n  // so we never show a Jess/Katie body under a different employee's header.\n  applyViewingProfile('Alan King');\n  // Restore the row-specific header values that applyViewingProfile just overwrote.\n  document.getElementById('profile-card-name').textContent = d.name;\n  document.getElementById('profile-card-ser').textContent = id;\n  photo.textContent = d.initials;\n  photo.style.background = d.color;\n  photo.style.color = d.textColor;\n  renderProfileBanners();\n  go('screen-emp-profile');\n}\n\nfunction renderProfileBanners() {\n  var html = '';\n  var name = document.getElementById('profile-card-name').textContent;\n  var ser = document.getElementById('profile-card-ser').textContent;\n  var d = empData[ser];\n\n  // \"I no longer work here\" button: only visible to the employee viewing their own profile\n  var viewerName = document.body.getAttribute('data-viewing-name') || '';\n  var role = document.body.getAttribute('data-viewing-role') || '';\n  var leaveBtn = document.getElementById('profile-leave-btn');\n  if (leaveBtn) {\n    var isOwnProfile = (role === 'Stable Staff') && (viewerName === name);\n    leaveBtn.classList.toggle('profile-leave-visible', isOwnProfile);\n  }\n\n  // Employee-side (Katie Butler) confirmation after flagging she's left\n  if (empState.showLeftStableSubmitted && ser === '23928') {\n    html += '<div class=\"banner banner-warn\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"/><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"/><\u002Fsvg><div><strong>Trainer notified.<\u002Fstrong> Alan King has been asked to confirm you no longer work at the stable. We&rsquo;ll let you know when they respond.<\u002Fdiv><\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showLeftStableSubmitted\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n\n  if (empState.showUpdateBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Employment details updated successfully<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showUpdateBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  if (empState.showPassCancelBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Racehorse pass cancelled successfully<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showPassCancelBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  if (empState.showPassApplyBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Pass card application sent to BHA — payment of £20.10 charged to your account<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showPassApplyBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  if (empState.showReplacementBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Replacement pass requested — £10.50 charged. New card posted within 5 working days.<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showReplacementBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  if (empState.showPhotoUpdatedBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>ID photo updated — new renewal date set to 06/05/2028<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showPhotoUpdatedBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  // Photo renewal warning (shows on Adam's profile while not dismissed)\n  if (empState.showPhotoRenewalWarning && ser === '48273') {\n    html += '<div class=\"banner banner-warn\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><path d=\"M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z\"/><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"/><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"/><\u002Fsvg><div><strong>ID photo renewal due in 2 months<\u002Fstrong> — due 20/07/2025. Update the photo before this date to avoid the pass being suspended.<\u002Fdiv><\u002Fdiv><button class=\"banner-action\" onclick=\"go(\\'screen-update-photo\\')\">Update photo<\u002Fbutton><button class=\"banner-close\" onclick=\"dismissBanner(\\'showPhotoRenewalWarning\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n\n  // Pass status updates\n  if (!empState.passActive) {\n    document.getElementById('profile-pass-status').textContent = 'No';\n    document.getElementById('profile-view-pass-btn').style.display = 'none';\n    document.getElementById('profile-cancel-pass-btn').style.display = 'none';\n    document.getElementById('profile-replace-btn').style.display = 'none';\n    document.getElementById('profile-apply-pass-btn').style.display = '';\n  } else {\n    document.getElementById('profile-pass-status').textContent = 'Yes';\n    document.getElementById('profile-view-pass-btn').style.display = '';\n    document.getElementById('profile-cancel-pass-btn').style.display = 'none';\n    document.getElementById('profile-replace-btn').style.display = 'none';\n    document.getElementById('profile-apply-pass-btn').style.display = 'none';\n  }\n\n  document.getElementById('profile-banners').innerHTML = html;\n}\n\nfunction renderEmpListBanners() {\n  var html = '';\n  if (empState.showWelcomeBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Magic link sent to Emma Harris — she has 14 days to confirm her details and submit<\u002Fdiv><button class=\"banner-action\" onclick=\"empSubtab(\\'pending\\')\">Track in Pending invites<\u002Fbutton><button class=\"banner-close\" onclick=\"dismissBanner(\\'showWelcomeBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  if (empState.showTerminationBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Employment terminated — Adam Browne moved to past employees<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showTerminationBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  // Trainer-side: employee flagged they no longer work here\n  if (empState.showTrainerLeftAlert) {\n    html += '<div class=\"banner banner-warn\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"/><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"/><\u002Fsvg><div><strong>Katie Butler has flagged she no longer works at your stable.<\u002Fstrong> Submitted 14/05/2026 — last day worked 12/05/2026. Confirm or dispute before her employment record changes.<\u002Fdiv><\u002Fdiv><button class=\"banner-action\" onclick=\"openConfirmLeftModal()\">Review<\u002Fbutton><\u002Fdiv>';\n  }\n  if (empState.showLeaveDisputedBanner) {\n    html += '<div class=\"banner banner-success\"><div class=\"banner-left\"><svg viewBox=\"0 0 24 24\"><polyline points=\"20 6 9 17 4 12\"/><\u002Fsvg>Disputed — Katie Butler stays on your register. She&rsquo;s been asked to discuss with you.<\u002Fdiv><button class=\"banner-close\" onclick=\"dismissBanner(\\'showLeaveDisputedBanner\\')\">✕<\u002Fbutton><\u002Fdiv>';\n  }\n  // Trainer-side: employee turned 16
